name: build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
        ocaml_version: ['4.14.3', '5.2.1', '5.3.0', '5.4.1']
    steps:
    - name: checkout
      uses: actions/checkout@v6
      with:
        submodules: true
    - name: devcontainer
      uses: ./.github/workflows/actions/devcontainer
      id: devcontainer
      env:
        OCAML_VERSION: ${{ matrix.ocaml_version }}
      with:
        variant: ${{ matrix.ocaml_version }}
    - name: setup
      run: |
        echo 'EXEC=${{ steps.devcontainer.outputs.exec }}' >> $GITHUB_ENV
    - name: info
      run: |
        ${{ env.EXEC }} sh -c 'uname -m && opam exec -- ocaml --version'
    - name: build
      run: |
        ${{ env.EXEC }} make
        file _build/default/main.exe
        ls -lh _build/default/main.exe
    - name: run
      run: |
        ${{ env.EXEC }} make run
    - name: top
      run: |
        echo 'Example.Hello.print ();;' | ${{ env.EXEC }} make top
    - name: utop
      run: |
        echo 'Example.Hello.print ();;' | ${{ env.EXEC }} make utop
    - name: static
      run: |
        ${{ env.EXEC }} make static
        file _build/default/main.exe
        ls -lh _build/default/main.exe
        _build/default/main.exe
    - name: format-check
      run: |
        ${{ env.EXEC }} make format-check
